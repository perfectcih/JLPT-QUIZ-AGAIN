<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium JP Master - Business Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@500;700&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05); }
        .option-btn:hover { background: #334155; border-color: #38bdf8; }
        .progress-fill { transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        
        .hidden-screen { display: none; }

        /* --- 한자 힌트 툴팁 스타일 --- */
        .kanji-container { position: relative; display: inline-block; }
        .hint-tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #38bdf8; /* Sky 400 */
            color: #0f172a;
            text-align: center;
            padding: 8px 12px;
            border-radius: 12px;
            white-space: nowrap;
            font-size: 0.875rem;
            font-weight: bold;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .hint-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #38bdf8 transparent transparent transparent;
        }
        /* PC: 호버 시 표시 / Mobile: 클래스 추가 시 표시 */
        .kanji-container:hover .hint-tooltip,
        .kanji-container.show-hint .hint-tooltip {
            visibility: visible;
            opacity: 1;
        }
        
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="app-container" class="w-full max-w-lg">
        
        <!-- [1] 시작 화면 -->
        <div id="start-screen" class="glass-card rounded-3xl p-10 text-center shadow-2xl">
            <h1 class="text-4xl font-bold mb-3 tracking-tight">JP Master</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-10">Select Study Module</p>
            <div class="space-y-4">
                <button onclick="selectSet('data.json')" class="w-full py-6 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl font-bold shadow-xl hover:scale-[1.02] active:scale-95 transition-all text-lg">
                    SET 01: 필수 동사 완결
                </button>
                <button onclick="selectSet('222.json')" class="w-full py-6 bg-gradient-to-r from-emerald-600 to-teal-600 rounded-2xl font-bold shadow-xl hover:scale-[1.02] active:scale-95 transition-all text-lg">
                    SET 02: 탁음·장음·훈독 명사
                </button>
            </div>
        </div>

        <!-- [2] 퀴즈 화면 -->
        <div id="quiz-screen" class="hidden-screen">
            <div class="mb-4 flex items-center justify-between text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                <span>Daily Goal Progress</span>
                <span id="progress-text">0 / 20</span>
            </div>
            <div class="w-full h-1.5 bg-slate-800 rounded-full mb-8 overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-sky-500 to-emerald-500 progress-fill" style="width: 0%"></div>
            </div>

            <div id="quiz-card" class="glass-card rounded-3xl shadow-2xl overflow-hidden relative">
                <div class="px-8 py-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <p id="quiz-type-label" class="text-[10px] font-bold text-sky-400 tracking-widest uppercase">Check Meaning</p>
                    <button onclick="location.reload()" class="text-[10px] px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-full border border-white/5 uppercase">세트 변경</button>
                </div>

                <div class="p-8">
                    <div id="question-container" class="text-center min-h-[220px] flex flex-col justify-center">
                        <div id="sentence-box" class="hidden mb-6 p-4 bg-slate-800/50 rounded-2xl border border-white/5 cursor-pointer hover:bg-slate-800 transition-colors" onclick="readQuestionSentence()">
                            <p id="sentence-context" class="text-slate-300 text-lg leading-relaxed"></p>
                        </div>
                        
                        <!-- 한자 힌트 기능이 포함된 구역 -->
                        <div class="kanji-container group" id="kanji-main-box">
                            <span class="hint-tooltip" id="kanji-hint-text">힌트 로딩중...</span>
                            <h2 id="question-word" class="text-6xl font-bold mb-2 text-white tracking-tight cursor-help" onclick="toggleHint(event)">...</h2>
                        </div>
                        
                        <p id="question-sub" class="text-slate-500 text-xs mt-3 tracking-tighter opacity-50">클릭하면 발음과 한자 힌트가 보입니다</p>
                    </div>
                    <div id="options" class="grid grid-cols-1 gap-3 mt-8"></div>
                </div>
                
                <div class="px-8 py-6 bg-white/5 flex justify-between items-center">
                    <button onclick="toggleWrongNote()" class="text-slate-400 hover:text-white text-xs font-medium flex items-center gap-2">📋 오답 노트 (<span id="wrong-count">0</span>)</button>
                    <span id="word-group-tag" class="text-[9px] bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full font-bold border border-sky-500/20 tracking-widest uppercase">GROUP</span>
                </div>
            </div>
        </div>

        <!-- [3] 완료 화면 -->
        <div id="completion-screen" class="glass-card rounded-3xl p-12 text-center hidden-screen">
            <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6"><span class="text-4xl">🎉</span></div>
            <h2 class="text-3xl font-bold mb-3 tracking-tight">Mission Clear!</h2>
            <div class="flex flex-col gap-3">
                <button onclick="toggleWrongNote()" class="w-full py-4 bg-sky-500 hover:bg-sky-400 text-white rounded-2xl font-bold transition-all shadow-lg">오답 확인</button>
                <button onclick="continueStudying()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold transition-all">계속 학습</button>
                <button onclick="resetDayForce()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-2xl font-bold transition-all border border-white/5 text-sm">기록 초기화</button>
                <button onclick="location.reload()" class="w-full py-4 bg-transparent text-slate-500 hover:text-slate-300 font-bold text-xs underline">메인으로</button>
            </div>
        </div>
    </div>

    <!-- 오답 노트 모달 -->
    <div id="wrong-note-modal" class="fixed inset-0 bg-slate-950/90 hidden z-50 p-6 flex items-center justify-center">
        <div class="w-full max-w-md bg-slate-900 rounded-3xl border border-white/10 shadow-2xl h-[80vh] flex flex-col">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h3 class="text-xl font-bold text-sky-400 font-mono uppercase">Mistake List</h3>
                <button onclick="toggleWrongNote()" class="p-2 hover:bg-white/10 rounded-full">✕</button>
            </div>
            <div id="wrong-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <div class="p-4 border-t border-white/5"><button onclick="clearWrongNote()" class="w-full py-3 text-sm text-red-400 hover:bg-red-500/10 rounded-xl transition-all">전체 초기화</button></div>
        </div>
    </div>

    <script>
        const GOAL = 20;
        const correctSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const wrongSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        correctSound.volume = 0.2; wrongSound.volume = 0.2;

        let wordDatabase = [];
        let currentWord = null;
        let currentAnswer = "";
        let solvedCount = parseInt(localStorage.getItem('solvedCount')) || 0;
        let lastDate = localStorage.getItem('lastDate') || "";
        let wrongWords = JSON.parse(localStorage.getItem('wrongWords')) || [];

        async function selectSet(fileName) {
            try {
                const response = await fetch(`./${fileName}?v=${Math.random()}`);
                if (!response.ok) throw new Error('Load failed');
                wordDatabase = await response.json();
                document.getElementById('start-screen').classList.add('hidden-screen');
                document.getElementById('quiz-screen').classList.remove('hidden-screen');
                initQuiz();
            } catch (error) {
                alert(`파일(${fileName})을 불러오지 못했습니다.`);
            }
        }

        function initQuiz() {
            const today = new Date().toDateString();
            if (lastDate !== today) {
                solvedCount = 0;
                lastDate = today;
                localStorage.setItem('solvedCount', 0);
                localStorage.setItem('lastDate', today);
            }
            updateProgressUI();
            if (solvedCount >= GOAL) { showCompletion(); return; }
            if (wordDatabase.length === 0) return;

            currentWord = wordDatabase[Math.floor(Math.random() * wordDatabase.length)];
            const types = ['meaning', 'yomigana', 'sentence'];
            let selectedType = types[Math.floor(Math.random() * types.length)];
            if (selectedType === 'sentence' && !currentWord.sentence) selectedType = 'meaning';
            
            setupUI(currentWord, selectedType);
        }

        function setupUI(word, type) {
            const wordEl = document.getElementById('question-word');
            const hintEl = document.getElementById('kanji-hint-text');
            const sentenceBox = document.getElementById('sentence-box');
            const contextEl = document.getElementById('sentence-context');
            const optionsContainer = document.getElementById('options');
            const typeLabel = document.getElementById('quiz-type-label');

            optionsContainer.innerHTML = '';
            sentenceBox.classList.add('hidden');
            document.getElementById('kanji-main-box').classList.remove('show-hint'); // 힌트 초기화
            document.getElementById('word-group-tag').innerText = word.group || 'N2';
            document.getElementById('wrong-count').innerText = wrongWords.length;

            // 힌트 내용 설정 (JSON에 hanja_info가 있으면 사용, 없으면 요미가나만 사용)
            hintEl.innerText = word.hanja_info ? `${word.yomigana} [${word.hanja_info}]` : word.yomigana;

            let correctAnswer = (type === 'yomigana') ? word.yomigana : word.meaning;
            let poolKey = (type === 'yomigana') ? 'yomigana' : 'meaning';

            if (type === 'sentence' && word.sentence) {
                sentenceBox.classList.remove('hidden');
                contextEl.innerText = word.sentence.replace(word.kanji, '____');
                typeLabel.innerText = "Check Context";
            } else {
                typeLabel.innerText = type === 'yomigana' ? "Check Reading" : "Check Meaning";
            }

            wordEl.innerText = word.kanji;
            currentAnswer = correctAnswer;
            
            generateOptions(correctAnswer, poolKey).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-4 text-left border border-white/10 rounded-2xl font-semibold text-slate-300 shadow-lg";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // 모바일용 힌트 토글 및 음성 재생
        function toggleHint(e) {
            e.preventDefault();
            const box = document.getElementById('kanji-main-box');
            box.classList.toggle('show-hint');
            readQuestionWord(); // 힌트 볼 때 발음도 같이 들려줌
        }

        function checkAnswer(selected, btn) {
            if (selected === currentAnswer) {
                solvedCount++;
                localStorage.setItem('solvedCount', solvedCount);
                updateProgressUI();
                btn.classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-400');
                correctSound.play();
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
                setTimeout(initQuiz, 700);
            } else {
                btn.classList.add('shake', 'border-red-500', 'text-red-500', 'bg-red-500/10');
                wrongSound.play();
                if (!wrongWords.some(w => w.kanji === currentWord.kanji)) {
                    wrongWords.push(currentWord);
                    localStorage.setItem('wrongWords', JSON.stringify(wrongWords));
                    document.getElementById('wrong-count').innerText = wrongWords.length;
                }
            }
        }

        function updateProgressUI() {
            const percent = Math.min((solvedCount / GOAL) * 100, 100);
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${solvedCount} / ${GOAL}`;
        }

        function showCompletion() {
            document.getElementById('quiz-screen').classList.add('hidden-screen');
            document.getElementById('completion-screen').classList.remove('hidden-screen');
        }

        function continueStudying() {
            document.getElementById('completion-screen').classList.add('hidden-screen');
            document.getElementById('quiz-screen').classList.remove('hidden-screen');
            initQuiz(); 
        }

        function resetDayForce() {
            if(confirm('기록을 초기화하시겠습니까?')) {
                solvedCount = 0;
                localStorage.setItem('solvedCount', 0);
                document.getElementById('completion-screen').classList.add('hidden-screen');
                document.getElementById('quiz-screen').classList.remove('hidden-screen');
                initQuiz();
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function readQuestionWord() { if (currentWord) speak(currentWord.yomigana); }
        function readQuestionSentence() { if (currentWord && currentWord.sentence) speak(currentWord.sentence.replace(currentWord.kanji, currentWord.yomigana)); }

        function toggleWrongNote() {
            const modal = document.getElementById('wrong-note-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) renderWrongList();
        }

        function renderWrongList() {
            const list = document.getElementById('wrong-list');
            list.innerHTML = wrongWords.length ? wrongWords.map(w => `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center cursor-pointer" onclick="speak('${w.yomigana}')">
                    <div><span class="text-sky-400 text-[10px] font-bold">${w.yomigana}</span><h4 class="text-lg font-bold">${w.kanji}</h4></div>
                    <span class="text-emerald-400 text-sm font-semibold">${w.meaning}</span>
                </div>
            `).join('') : '<p class="text-center text-slate-500 mt-10">오답 기록이 없습니다.</p>';
        }

        function generateOptions(correct, key) {
            let opts = [correct];
            let pool = wordDatabase.map(w => w[key]).filter(v => v !== correct);
            pool = [...new Set(pool)].sort(() => Math.random() - 0.5);
            while (opts.length < 4 && pool.length > 0) opts.push(pool.pop());
            return opts.sort(() => Math.random() - 0.5);
        }

        function clearWrongNote() {
            if(confirm('오답 노트를 초기화하시겠습니까?')) {
                wrongWords = [];
                localStorage.removeItem('wrongWords');
                renderWrongList();
                document.getElementById('wrong-count').innerText = 0;
            }
        }
    </script>
</body>
</html>
